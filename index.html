<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Навігація</title>
    <link rel="stylesheet" href="./index.css" />
    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <nav class="custom-navbar">
      <div class="container">
        <div class="row align-items-center">
          <!-- Logo -->
          <div class="col-6 col-md-4">
            <a href="#" class="logo"> 
              <img src="./imges/logo.png" alt="">  
            </a>
          </div>

          <!-- Desktop Navigation -->
          <div
            class="col-6 col-md-8 d-flex justify-content-end align-items-center"
          >
            <ul class="nav-links d-none d-md-flex">
              <li><a href="#">Головна</a></li>
              <li><a href="#">Каталог</a></li>
            </ul>

            <!-- Mobile Menu Button -->
            <button
              class="menu-btn d-md-none"
              type="button"
              data-bs-toggle="collapse"
              data-bs-target="#mobileMenu"
              aria-expanded="false"
              aria-label="Відкрити меню"
            >
              ☰
            </button>
          </div>
        </div>

        <!-- Mobile Menu -->
        <div class="collapse d-md-none" id="mobileMenu">
          <ul class="mobile-links">
            <li><a href="#">Головна</a></li>
            <li><a href="#">Каталог</a></li>
          </ul>
        </div>
      </div>
    </nav>
    
    <section class="hero">
      <div class="container">
        <div class="hero-content">
          <span class="hero-subtitle">Веломагазин №1</span>

          <h1>Велосипеди для<br />будь-яких пригод</h1>

          <p>
            Гірські, шосейні, міські та електровелосипеди від провідних
            виробників. Обирайте модель, що підійде саме вам.
          </p>

          <div class="hero-buttons">
            <a href="#" class="btn-primary-custom">Переглянути каталог</a>
            <a href="#" class="btn-secondary-custom">Дізнатись більше</a>
          </div>
        </div>
      </div>
    </section>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
